name: 构建 Infuse Plus (修改版)

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "已脱壳的 Infuse 原版 IPA 文件直链地址"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "要注入的 InfusePlus 插件版本号 (从 dayanch96/InfusePlus/releases 获取，或保持默认)"
        default: "2.5"
        required: true
        type: string

      display_name:
        description: "App 在桌面上显示的名称 (可选)"
        default: "Infuse"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID 包名 (可选，用于多开或自签)"
        default: "com.firecore.infuse"
        required: true
        type: string

      app_version:
        description: "用于生成文件名的 App 版本号 (例如：8.3.9)。留空则默认文件名为 InfusePlus.ipa"
        default: ""
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 编译与注入 Infuse Plus
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: 检出主分支代码
        uses: actions/checkout@v4.1.1
        with:
          path: main
          submodules: recursive

      - name: 隐藏敏感输入信息 (日志打码)
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: display_name,tweak_version,bundle_id,app_version

      - name: 验证 IPA 下载链接
        run: |
          curl -L -r 0-1023 -o sample.part "${{ inputs.ipa_url }}" > /dev/null 2>&1
          file_type=$(file --mime-type -b sample.part)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::验证失败：提供的链接不是有效的 IPA 文件。检测到的类型为: $file_type。"
            exit 1
          fi

      - name: 安装系统依赖环境
        run: brew install make ldid

      - name: 配置 PATH 环境变量
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: 安装 Cyan 注入工具
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: 下载 Infuse Plus 插件 (.deb)
        id: download_infp
        run: |
          deb_url="https://github.com/dayanch96/InfusePlus/releases/download/v${{ inputs.tweak_version }}/com.dvntm.infuseplus_${{ inputs.tweak_version }}_iphoneos-arm.deb"
          wget "$deb_url" --no-verbose -O ${{ github.workspace }}/infplus.deb

      - name: 下载原版 Infuse 应用 (.ipa)
        id: download_infuse
        run: wget "${{ inputs.ipa_url }}" --no-verbose -O ${{ github.workspace }}/infuse.ipa

      - name: 确定最终生成的文件名
        id: set_filename
        run: |
          if [ -z "${{ inputs.app_version }}" ]; then
            echo "FILE_BASE_NAME=InfusePlus" >> $GITHUB_ENV
          else
            echo "FILE_BASE_NAME=InfusePlus-${{ inputs.app_version }}" >> $GITHUB_ENV
          fi

      - name: 将插件注入 IPA 并重新打包
        run: cyan -i infuse.ipa -o ${{ env.FILE_BASE_NAME }}.ipa -uwef infplus.deb -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: 生成发布标签与描述
        id: tag
        run: |
          # 获取当前时间作为 tag 的一部分，防止重复运行导致 tag 冲突
          CURRENT_DATE=$(date +'%Y%m%d-%H%M')
          echo "release_tag=${{ env.FILE_BASE_NAME }}-${CURRENT_DATE}" >> $GITHUB_OUTPUT
          
          # 创建 Release 页面显示的说明文本
          touch release.txt
          echo "### 🚀 Infuse Plus 自动注入成功" >> release.txt
          echo "- **原始版本**: ${{ inputs.app_version || '未指定' }}" >> release.txt
          echo "- **插件版本**: v${{ inputs.tweak_version }}" >> release.txt
          echo "- **应用包名**: ${{ inputs.bundle_id }}" >> release.txt
          echo "- **桌面名称**: ${{ inputs.display_name }}" >> release.txt
          echo "" >> release.txt
          echo "📥 **请下载下方的 \`.ipa\` 文件进行侧载安装。**" >> release.txt

      - name: 上传至 GitHub Releases (正式发布)
        uses: softprops/action-gh-release@v2.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ env.FILE_BASE_NAME }}
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FILE_BASE_NAME }}.ipa
          draft: false

      - name: 输出 Release 发布地址
        run: |
          echo "::notice::构建完成！发布页面地址: https://github.com/${{ github.repository }}/releases"
